# ============================================================================
# Local STDIO Profile Configuration
# ============================================================================
# This profile is designed for local development with STDIO transport.
# Primarily used for integration with Claude Desktop and other STDIO-based
# MCP clients.
#
# FEATURES:
#   - STDIO transport (stdin/stdout) for Claude Desktop integration
#   - Testcontainers for automatic PostgreSQL with pgvector
#   - Local AI models via atomic profiles
#   - No web server (pure STDIO mode)
#
# ACTIVATED BY:
#   ./test-mcp.sh --local --stdio [atomic-model-profiles]
#   OR
#   mvn spring-boot:run -Dspring-boot.run.profiles=local-stdio,[atomic-profiles]
#
# REQUIREMENTS:
#   - Docker (for Testcontainers PostgreSQL)
#   - AI model profiles (--chat-* and --embed-*)
#   - Claude Desktop or compatible STDIO MCP client
#
# USAGE EXAMPLES:
#   ./test-mcp.sh --local --stdio --chat-openai --embed-ollama
#   ./test-mcp.sh --local --stdio --chat-ollama --embed-ollama
#
# ADVANTAGES:
#   - Direct integration with Claude Desktop
#   - Automatic database setup via Testcontainers
#   - Hybrid AI model support (mix local + cloud)
# ============================================================================

# MCP Server Configuration
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# STDIO Transport Settings
spring.ai.mcp.server.stdio=true

# Web Application Configuration
spring.main.web-application-type=none

# Change Notifications
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true

# Database Configuration (Testcontainers PostgreSQL with PGVector)
# URL, username, password set dynamically by DatabaseConfiguration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Vector Database Configuration (auto-configured by Testcontainers)
spring.ai.vectordatabase.pgvector.table-name=vector_store
spring.ai.vectordatabase.pgvector.dimensions=768
spring.ai.vectordatabase.pgvector.initialize-schema=true

# Model Configuration (disabled by default - use atomic profiles)
# Models will be configured by atomic profiles: chat-openai, chat-ollama, embed-openai, embed-ollama

# RAG Pipeline Configuration
app.rag.similarity-threshold=0.5
app.rag.max-results=5

# Logging Configuration (STDIO compatible)
spring.main.banner-mode=off
logging.level.com.baskettecase=WARN
logging.level.org.springframework.ai.mcp=WARN
logging.level.org.springframework=WARN
logging.level.root=WARN