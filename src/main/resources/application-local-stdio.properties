# Local STDIO Profile Configuration
# Environment: Local development with Ollama models
# Transport: STDIO for Claude Desktop compatibility

# MCP Server Configuration
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# STDIO Transport Settings
spring.ai.mcp.server.stdio=true

# Web Application Configuration
spring.main.web-application-type=none

# Change Notifications
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true

# Database Configuration (Testcontainers PostgreSQL with PGVector)
# URL, username, password set dynamically by DatabaseConfiguration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Vector Database Configuration (auto-configured by Testcontainers)
spring.ai.vectordatabase.pgvector.table-name=vector_store
spring.ai.vectordatabase.pgvector.dimensions=768
spring.ai.vectordatabase.pgvector.initialize-schema=true

# Ollama Configuration (Local Profile)
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_CHAT_MODEL:llama3.2:3b}
spring.ai.ollama.embedding.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text:latest}

# OpenAI Configuration (disabled by default for local profiles)
# Uncomment the following lines if you have an OpenAI API key
# spring.ai.openai.api-key=${OPENAI_API_KEY:}
# spring.ai.openai.chat.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
# spring.ai.openai.embedding.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# Logging Configuration (STDIO compatible)
spring.main.banner-mode=off
logging.level.com.baskettecase=WARN
logging.level.org.springframework.ai.mcp=WARN
logging.level.org.springframework=WARN
logging.level.root=WARN