# ============================================================================
# OpenAI Embedding Model Configuration (Atomic Profile)
# ============================================================================
# This profile configures ONLY the OpenAI embedding model for vector generation.
# Embeddings are used for semantic search, RAG, and vector similarity.
# 
# USAGE:
#   Combine with chat profiles for complete AI functionality:
#   - Pure OpenAI:    --chat-openai --embed-openai
#   - Hybrid:         --chat-ollama --embed-openai
#
# ACTIVATED BY:
#   ./test-mcp.sh --embed-openai [other-profiles]
#   OR
#   mvn spring-boot:run -Dspring-boot.run.profiles=embed-openai,[others]
#
# REQUIREMENTS:
#   - OPENAI_API_KEY environment variable must be set
#   - Valid OpenAI API key with sufficient credits
#
# MODEL OPTIONS:
#   Override default model via OPENAI_EMBEDDING_MODEL environment variable
#   Available models: text-embedding-3-small, text-embedding-3-large, text-embedding-ada-002
#   
# ADVANTAGES:
#   - High-quality embeddings with excellent semantic understanding
#   - Consistent performance and reliability
#   - Regular model updates and improvements
#   - Good multilingual support
# ============================================================================

# OpenAI API Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Embedding Model Selection (default: text-embedding-3-small)
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# Enable OpenAI as the embedding model provider
spring.ai.model.embedding=openai