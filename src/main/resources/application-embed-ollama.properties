# ============================================================================
# Ollama Embedding Model Configuration (Atomic Profile)
# ============================================================================
# This profile configures ONLY the Ollama embedding model for local vector generation.
# Embeddings are used for semantic search, RAG, and vector similarity.
# 
# USAGE:
#   Combine with chat profiles for complete AI functionality:
#   - Pure Local:     --chat-ollama --embed-ollama
#   - Hybrid (rec.):  --chat-openai --embed-ollama
#
# ACTIVATED BY:
#   ./test-mcp.sh --embed-ollama [other-profiles]
#   OR
#   mvn spring-boot:run -Dspring-boot.run.profiles=embed-ollama,[others]
#
# REQUIREMENTS:
#   - Ollama installed and running (ollama serve)
#   - Embedding model pulled locally: ollama pull nomic-embed-text
#   - Ollama server accessible at localhost:11434
#
# MODEL OPTIONS:
#   Override default model via OLLAMA_EMBEDDING_MODEL environment variable
#   Popular embedding models: nomic-embed-text, mxbai-embed-large, all-minilm
#   
# ADVANTAGES:
#   - No API costs for embeddings
#   - Complete privacy (data never leaves your machine)
#   - Works offline
#   - Consistent embedding dimensions
#   - Good performance for local RAG applications
#
# RECOMMENDED COMBINATION:
#   --chat-openai --embed-ollama (reliable chat + working local embeddings)
# ============================================================================

# Ollama Server Configuration
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Embedding Model Selection (default: nomic-embed-text:latest)
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text:latest}

# Enable Ollama as the embedding model provider
spring.ai.model.embedding=ollama