# ============================================================================
# IMC Policy MCP Server - Main Configuration
# ============================================================================
# This is an Insurance MegaCorp Policy Management system built as an MCP Server
# (Model Context Protocol) with Spring AI integration.
#
# ATOMIC MODEL PROFILE ARCHITECTURE:
#   This application uses atomic profiles for maximum flexibility:
#   
#   TRANSPORT PROFILES (choose one):
#   ├── local-sse      → Local dev with web interface (port 8080)
#   ├── local-stdio    → Local dev with Claude Desktop integration  
#   └── cloud          → Production deployment with external services
#
#   AI MODEL PROFILES (choose one chat + one embedding):
#   ├── chat-openai    → OpenAI chat models (gpt-4.1-nano, etc.)
#   ├── chat-ollama    → Local Ollama chat models (phi3, llama, etc.)
#   ├── embed-openai   → OpenAI embeddings (text-embedding-3-small)
#   └── embed-ollama   → Local Ollama embeddings (nomic-embed-text)
#
# USAGE EXAMPLES:
#   Recommended hybrid (reliable chat + free embeddings):
#   ./test-mcp.sh --local --sse --chat-openai --embed-ollama
#
#   Pure local (no API costs):
#   ./test-mcp.sh --local --sse --chat-ollama --embed-ollama
#
#   Pure cloud (maximum reliability):
#   ./test-mcp.sh --cloud --chat-openai --embed-openai
#
# FEATURES:
#   - RAG (Retrieval Augmented Generation) for policy documents
#   - Vector similarity search with pgvector
#   - Multi-model AI support (OpenAI + Ollama)
#   - MCP protocol for Claude Desktop integration
#   - Spring AI integration with function calling
#
# DOCUMENTATION:
#   See individual profile files for detailed configuration options:
#   - application-chat-*.properties   (Chat model configuration)
#   - application-embed-*.properties  (Embedding model configuration)  
#   - application-local-*.properties  (Local development)
#   - application-cloud.properties    (Production deployment)
# ============================================================================

# Default profile activation (SSE transport for web-based development)
spring.profiles.active=sse

# Base MCP Server Configuration
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=1.0.0
