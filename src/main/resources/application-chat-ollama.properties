# ============================================================================
# Ollama Chat Model Configuration (Atomic Profile)
# ============================================================================
# This profile configures ONLY the Ollama chat model for local text generation.
# 
# USAGE:
#   Combine with embedding profiles for complete AI functionality:
#   - Pure Local:     --chat-ollama --embed-ollama
#   - Hybrid:         --chat-ollama --embed-openai
#
# ACTIVATED BY:
#   ./test-mcp.sh --chat-ollama [other-profiles]
#   OR
#   mvn spring-boot:run -Dspring-boot.run.profiles=chat-ollama,[others]
#
# REQUIREMENTS:
#   - Ollama installed and running (ollama serve)
#   - Model pulled locally: ollama pull phi3
#   - Ollama server accessible at localhost:11434
#
# MODEL OPTIONS:
#   Override default model via OLLAMA_CHAT_MODEL environment variable
#   Popular options: phi3, llama2, llama3, mistral, codellama
#   
# ADVANTAGES:
#   - No API costs or rate limits
#   - Complete privacy (data never leaves your machine)
#   - Works offline
#   - Fast response times on local hardware
# ============================================================================

# Ollama Server Configuration
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Chat Model Selection (default: phi3)
spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:phi3}

# Enable Ollama as the chat model provider
spring.ai.model.chat=ollama