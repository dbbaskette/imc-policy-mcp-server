# ============================================================================
# Local SSE Profile Configuration
# ============================================================================
# This profile is designed for local development with SSE transport.
# Ideal for web-based MCP clients and testing the MCP server via HTTP.
#
# FEATURES:
#   - SSE (Server-Sent Events) transport for web clients
#   - Testcontainers for automatic PostgreSQL with pgvector
#   - Reactive web stack for real-time communication
#   - Local AI models via atomic profiles
#
# ACTIVATED BY:
#   ./test-mcp.sh --local --sse [atomic-model-profiles]
#   OR
#   mvn spring-boot:run -Dspring-boot.run.profiles=local-sse,[atomic-profiles]
#
# REQUIREMENTS:
#   - Docker (for Testcontainers PostgreSQL)
#   - AI model profiles (--chat-* and --embed-*)
#   - Web browser or HTTP client for testing
#
# USAGE EXAMPLES:
#   ./test-mcp.sh --local --sse --chat-openai --embed-ollama
#   ./test-mcp.sh --local --sse --chat-ollama --embed-ollama
#
# ADVANTAGES:
#   - Web-based testing and debugging
#   - Real-time communication via SSE
#   - Automatic database setup via Testcontainers
#   - Hybrid AI model support (mix local + cloud)
#
# ENDPOINTS:
#   - MCP Server: http://localhost:8080/mcp/message
#   - Health Check: http://localhost:8080/actuator/health
# ============================================================================

# MCP Server Configuration
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# SSE Transport Settings
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# Web Application Configuration
spring.main.web-application-type=reactive

# Change Notifications
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true

# Vector Database Configuration (Testcontainers PostgreSQL)
spring.ai.vectordatabase.pgvector.host=localhost
spring.ai.vectordatabase.pgvector.port=5433
spring.ai.vectordatabase.pgvector.database=policy_rag_test
spring.ai.vectordatabase.pgvector.username=test
spring.ai.vectordatabase.pgvector.password=test
spring.ai.vectordatabase.pgvector.table-name=vector_store
spring.ai.vectordatabase.pgvector.dimensions=768



# Database Configuration (PostgreSQL via Testcontainers - will be overridden by DatabaseConfiguration)
# These are defaults, actual values are set by DatabaseConfiguration.java
spring.datasource.url=jdbc:postgresql://localhost:5432/policy_rag_test
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.sql.init.mode=always

# RAG Pipeline Configuration (very permissive for testing)
app.rag.similarity-threshold=0.1
app.rag.max-results=10

# Logging Configuration
spring.main.banner-mode=log
logging.level.com.baskettecase=INFO
logging.level.org.springframework.ai.mcp=DEBUG