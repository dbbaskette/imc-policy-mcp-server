# Local SSE Profile Configuration
# Environment: Local development with Ollama models
# Transport: SSE (Server-Sent Events) for web clients

# MCP Server Configuration
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# SSE Transport Settings
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# Web Application Configuration
spring.main.web-application-type=reactive

# Change Notifications
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true

# Vector Database Configuration (Testcontainers PostgreSQL)
spring.ai.vectordatabase.pgvector.host=localhost
spring.ai.vectordatabase.pgvector.port=5433
spring.ai.vectordatabase.pgvector.database=policy_rag_test
spring.ai.vectordatabase.pgvector.username=test
spring.ai.vectordatabase.pgvector.password=test
spring.ai.vectordatabase.pgvector.table-name=vector_store
spring.ai.vectordatabase.pgvector.dimensions=768

# Ollama Configuration (Local Profile Only)
spring.ai.ollama.enabled=true
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:llama3.2:3b}
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text:latest}

# Database Configuration (H2 for testing)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.sql.init.mode=always

# Logging Configuration
spring.main.banner-mode=log
logging.level.com.baskettecase=INFO
logging.level.org.springframework.ai.mcp=DEBUG