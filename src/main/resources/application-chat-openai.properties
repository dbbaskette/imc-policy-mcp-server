# ============================================================================
# OpenAI Chat Model Configuration (Atomic Profile)
# ============================================================================
# This profile configures ONLY the OpenAI chat model for text generation.
# 
# USAGE:
#   Combine with embedding profiles for complete AI functionality:
#   - Pure OpenAI:    --chat-openai --embed-openai
#   - Hybrid (rec.):  --chat-openai --embed-ollama
#
# ACTIVATED BY:
#   ./test-mcp.sh --chat-openai [other-profiles]
#   OR
#   mvn spring-boot:run -Dspring-boot.run.profiles=chat-openai,[others]
#
# REQUIREMENTS:
#   - OPENAI_API_KEY environment variable must be set
#   - Valid OpenAI API key with sufficient credits
#
# MODEL OPTIONS:
#   Override default model via OPENAI_CHAT_MODEL environment variable
#   Popular options: gpt-4.1-nano, gpt-4o, gpt-4o-mini, gpt-3.5-turbo
# ============================================================================

# OpenAI API Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Chat Model Selection (default: gpt-4.1-nano)
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:gpt-4.1-nano}

# Enable OpenAI as the chat model provider
spring.ai.model.chat=openai