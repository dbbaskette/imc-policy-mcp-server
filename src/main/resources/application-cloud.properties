# ============================================================================
# Cloud Profile Configuration
# ============================================================================
# This profile is designed for cloud deployments (Cloud Foundry, Kubernetes, etc.)
# and uses external services for maximum scalability and reliability.
#
# FEATURES:
#   - OpenAI models (chat + embeddings) for reliable AI functionality
#   - External PostgreSQL with pgvector for persistent vector storage
#   - SSE (Server-Sent Events) transport for web-based clients
#   - Reactive web stack for high concurrency
#
# ACTIVATED BY:
#   ./test-mcp.sh --cloud [other-options]
#   OR
#   mvn spring-boot:run -Dspring-boot.run.profiles=cloud
#
# REQUIREMENTS:
#   - OPENAI_API_KEY environment variable
#   - PostgreSQL database with pgvector extension
#   - Network connectivity to OpenAI APIs
#
# DEPLOYMENT:
#   Ideal for production environments where you need:
#   - Horizontal scaling
#   - High availability
#   - Persistent vector data
#   - External AI services
# ============================================================================

# MCP Server Configuration
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# SSE Transport Settings
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# Web Application Configuration
spring.main.web-application-type=reactive

# Change Notifications
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true

# Vector Database Configuration (Cloud PostgreSQL)
spring.ai.vectordatabase.pgvector.host=${PGVECTOR_HOST:localhost}
spring.ai.vectordatabase.pgvector.port=${PGVECTOR_PORT:5432}
spring.ai.vectordatabase.pgvector.database=${PGVECTOR_DATABASE:policy_rag}
spring.ai.vectordatabase.pgvector.username=${PGVECTOR_USERNAME:postgres}
spring.ai.vectordatabase.pgvector.password=${PGVECTOR_PASSWORD:password}
spring.ai.vectordatabase.pgvector.table-name=vector_store
spring.ai.vectordatabase.pgvector.dimensions=1536
spring.ai.vectordatabase.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectordatabase.pgvector.index-type=HNSW
spring.ai.vectordatabase.pgvector.initialize-schema=true

# AI Model Configuration (Pure OpenAI for Cloud)
# Uses OpenAI for both chat and embeddings for maximum reliability
spring.ai.openai.api-key=${OPENAI_API_KEY:not-set}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:gpt-4.1-nano}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
spring.ai.model.chat=openai
spring.ai.model.embedding=openai

# RAG Pipeline Configuration
app.rag.similarity-threshold=0.5
app.rag.max-results=10

# Actuator Configuration (Health Checks and Monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always

# Logging Configuration
spring.main.banner-mode=log
logging.level.com.baskettecase=INFO
logging.level.org.springframework.ai.mcp=DEBUG