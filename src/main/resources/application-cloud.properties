# Cloud Profile Configuration
# This profile uses OpenAI models and Cloud Foundry PostgreSQL

# MCP Server Configuration
spring.ai.mcp.server.name=mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# SSE Transport Settings
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# Web Application Configuration
spring.main.web-application-type=reactive

# Change Notifications
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true

# Vector Database Configuration (Cloud PostgreSQL)
spring.ai.vectordatabase.pgvector.host=${PGVECTOR_HOST:localhost}
spring.ai.vectordatabase.pgvector.port=${PGVECTOR_PORT:5432}
spring.ai.vectordatabase.pgvector.database=${PGVECTOR_DATABASE:policy_rag}
spring.ai.vectordatabase.pgvector.username=${PGVECTOR_USERNAME:postgres}
spring.ai.vectordatabase.pgvector.password=${PGVECTOR_PASSWORD:password}
spring.ai.vectordatabase.pgvector.table-name=vector_store
spring.ai.vectordatabase.pgvector.dimensions=1536

# OpenAI Configuration (Cloud Profile)
spring.ai.openai.api-key=${OPENAI_API_KEY:not-set}
spring.ai.openai.chat.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
spring.ai.openai.embedding.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# Logging Configuration
spring.main.banner-mode=log
logging.level.com.baskettecase=INFO
logging.level.org.springframework.ai.mcp=DEBUG